<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
    user-select: none;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #00e676, #00b0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  #score-board {
    display: flex;
    gap: 40px;
    margin-bottom: 16px;
    font-size: 1rem;
    color: #aaa;
  }

  #score-board span {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #score-board .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
  #score-board .value { font-size: 1.4rem; font-weight: 700; color: #fff; }

  #game-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 230, 118, 0.15), 0 0 0 1px rgba(255,255,255,0.06);
  }

  canvas { display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 20, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
  }

  #overlay-score { color: #aaa; font-size: 1rem; }

  #btn-start {
    margin-top: 8px;
    padding: 12px 36px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #00e676, #00b0ff);
    color: #0f0f1a;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
  }

  #hint {
    margin-top: 16px;
    font-size: 0.8rem;
    color: #555;
    text-align: center;
    line-height: 1.8;
  }

  /* Mobile D-pad */
  #dpad {
    display: none;
    margin-top: 20px;
    gap: 0;
    flex-direction: column;
    align-items: center;
  }

  .dpad-row { display: flex; }

  .dpad-btn {
    width: 56px;
    height: 56px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #ccc;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .dpad-btn:active { background: rgba(0, 230, 118, 0.25); }

  .dpad-center {
    width: 56px;
    height: 56px;
    background: transparent;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
    #dpad { display: flex; }
  }
</style>
</head>
<body>

<h1>贪吃蛇</h1>

<div id="score-board">
  <span><span class="label">分数</span><span class="value" id="score">0</span></span>
  <span><span class="label">最高分</span><span class="value" id="best">0</span></span>
  <span><span class="label">速度</span><span class="value" id="level">1</span></span>
</div>

<div id="game-wrapper">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div id="overlay-title">贪吃蛇</div>
    <div id="overlay-score"></div>
    <button id="btn-start">开始游戏</button>
    <div id="hint">方向键 / WASD 控制<br>移动端：滑动屏幕</div>
  </div>
</div>

<div id="dpad">
  <div class="dpad-row">
    <div class="dpad-center"></div>
    <button class="dpad-btn" data-dir="up">▲</button>
    <div class="dpad-center"></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" data-dir="left">◀</button>
    <div class="dpad-center"></div>
    <button class="dpad-btn" data-dir="right">▶</button>
  </div>
  <div class="dpad-row">
    <div class="dpad-center"></div>
    <button class="dpad-btn" data-dir="down">▼</button>
    <div class="dpad-center"></div>
  </div>
</div>

<script>
(() => {
  // ── Config ──────────────────────────────────────────────────────────────
  const COLS = 20, ROWS = 20;
  const CELL = Math.min(Math.floor((Math.min(window.innerWidth - 32, 480)) / COLS), 24);
  const W = COLS * CELL, H = ROWS * CELL;

  const BASE_INTERVAL = 160; // ms at level 1
  const SPEED_STEP    = 12;  // ms reduction per level-up
  const LEVEL_EVERY   = 5;   // points per level

  // ── Canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = W;
  canvas.height = H;

  // ── State ────────────────────────────────────────────────────────────────
  let snake, dir, nextDir, food, bonus, score, best, level, running, loopId;
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  document.getElementById('best').textContent = best;

  // ── Helpers ──────────────────────────────────────────────────────────────
  const rnd = n => Math.floor(Math.random() * n);

  function spawnFood(exclude) {
    let pos;
    do {
      pos = { x: rnd(COLS), y: rnd(ROWS) };
    } while (exclude.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function spawnBonus(exclude) {
    if (Math.random() > 0.3) return null;
    let pos;
    do {
      pos = { x: rnd(COLS), y: rnd(ROWS) };
    } while (exclude.some(s => s.x === pos.x && s.y === pos.y) || (food && pos.x === food.x && pos.y === food.y));
    return { ...pos, ttl: 80 };
  }

  function initGame() {
    const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
    snake   = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    level   = 1;
    food    = spawnFood(snake);
    bonus   = null;
    updateUI();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent  = best;
    document.getElementById('level').textContent = level;
  }

  // ── Drawing ──────────────────────────────────────────────────────────────
  function drawGrid() {
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
    }
  }

  function drawCell(x, y, color, radius = 3) {
    const px = x * CELL + 1, py = y * CELL + 1, sz = CELL - 2;
    ctx.beginPath();
    ctx.roundRect(px, py, sz, sz, radius);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      if (i === 0) {
        // Head — bright green
        drawCell(seg.x, seg.y, '#00e676', 5);
        // Eyes
        const px = seg.x * CELL, py = seg.y * CELL;
        ctx.fillStyle = '#0f0f1a';
        const eyeR = CELL * 0.12;
        const [e1, e2] = eyePositions(dir, px, py);
        ctx.beginPath(); ctx.arc(e1.x, e1.y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2.x, e2.y, eyeR, 0, Math.PI * 2); ctx.fill();
      } else {
        const g = Math.round(180 - t * 80);
        drawCell(seg.x, seg.y, `rgb(0,${g},80)`, 3);
      }
    });
  }

  function eyePositions(d, px, py) {
    const c = CELL, h = c / 2, q = c * 0.28;
    if (d.x === 1)  return [{ x: px+c*0.75, y: py+h-q }, { x: px+c*0.75, y: py+h+q }];
    if (d.x === -1) return [{ x: px+c*0.25, y: py+h-q }, { x: px+c*0.25, y: py+h+q }];
    if (d.y === -1) return [{ x: px+h-q, y: py+c*0.25 }, { x: px+h+q, y: py+c*0.25 }];
    return                 [{ x: px+h-q, y: py+c*0.75 }, { x: px+h+q, y: py+c*0.75 }];
  }

  function drawFood() {
    const px = food.x * CELL + CELL / 2;
    const py = food.y * CELL + CELL / 2;
    const r  = CELL * 0.35;
    // Glow
    const grd = ctx.createRadialGradient(px, py, 0, px, py, r * 1.8);
    grd.addColorStop(0, 'rgba(255,80,80,0.5)');
    grd.addColorStop(1, 'rgba(255,80,80,0)');
    ctx.beginPath(); ctx.arc(px, py, r * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    // Apple
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ff5252'; ctx.fill();
    // Shine
    ctx.beginPath(); ctx.arc(px - r * 0.3, py - r * 0.3, r * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
  }

  function drawBonus() {
    if (!bonus) return;
    const px = bonus.x * CELL + CELL / 2;
    const py = bonus.y * CELL + CELL / 2;
    const r  = CELL * 0.38;
    const alpha = Math.min(1, bonus.ttl / 20);
    // Glow
    const grd = ctx.createRadialGradient(px, py, 0, px, py, r * 2);
    grd.addColorStop(0, `rgba(255,215,0,${alpha * 0.6})`);
    grd.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.beginPath(); ctx.arc(px, py, r * 2, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    // Star
    ctx.save();
    ctx.translate(px, py);
    ctx.globalAlpha = alpha;
    drawStar(ctx, 0, 0, 5, r, r * 0.45);
    ctx.fillStyle = '#ffd700'; ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
    let rot = Math.PI / 2 * 3, step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR); rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR); rot += step;
    }
    ctx.closePath();
  }

  function render() {
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawFood();
    drawBonus();
    drawSnake();
  }

  // ── Game loop ─────────────────────────────────────────────────────────────
  function tick() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

    snake.unshift(head);

    let grew = false;
    if (head.x === food.x && head.y === food.y) {
      grew  = true;
      score += 1;
      level  = Math.floor(score / LEVEL_EVERY) + 1;
      food   = spawnFood(snake);
      if (score % 3 === 0) bonus = spawnBonus(snake);
      updateUI();
    } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
      grew   = true;
      score += 3;
      level  = Math.floor(score / LEVEL_EVERY) + 1;
      bonus  = null;
      updateUI();
    } else {
      snake.pop();
    }

    if (bonus) { bonus.ttl--; if (bonus.ttl <= 0) bonus = null; }

    render();

    if (score > best) { best = score; localStorage.setItem('snakeBest', best); }

    const interval = Math.max(60, BASE_INTERVAL - (level - 1) * SPEED_STEP);
    loopId = setTimeout(tick, interval);
  }

  function startGame() {
    if (loopId) clearTimeout(loopId);
    initGame();
    running = true;
    document.getElementById('overlay').classList.add('hidden');
    render();
    loopId = setTimeout(tick, BASE_INTERVAL);
  }

  function endGame() {
    running = false;
    clearTimeout(loopId);
    if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = '游戏结束';
    document.getElementById('overlay-score').textContent = `得分：${score}　最高：${best}`;
    document.getElementById('btn-start').textContent = '再来一局';
    overlay.classList.remove('hidden');
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  const keyMap = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', e => {
    const d = keyMap[e.key];
    if (d) {
      e.preventDefault();
      if (!running) { startGame(); return; }
      if (d.x === -dir.x && d.y === -dir.y) return; // no reverse
      nextDir = d;
    }
  });

  document.getElementById('btn-start').addEventListener('click', startGame);

  // D-pad buttons
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const map = { up: { x:0,y:-1 }, down: { x:0,y:1 }, left: { x:-1,y:0 }, right: { x:1,y:0 } };
      const d = map[btn.dataset.dir];
      if (!d) return;
      if (!running) { startGame(); return; }
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    });
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let d;
    if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? { x:1,y:0 } : { x:-1,y:0 };
    else                              d = dy > 0 ? { x:0,y:1 } : { x:0,y:-1 };
    if (!running) { startGame(); return; }
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  }, { passive: true });

  // ── Init render ───────────────────────────────────────────────────────────
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);
})();
</script>
</body>
</html>
